[metadata]
author_name = "ScaleAI"
author_email = "unknown"
difficulty = "medium"
category = "refactoring"
tags = ["refactoring", "master-validator", "rubric-graded", "Python"]

[verifier]
timeout_sec = 7200

[verifier.env]
EVAL_API_KEY = "${OPENAI_API_KEY}"
EVAL_BASE_URL = "${OPENAI_API_BASE}"
EVAL_MODEL = "${EVAL_MODEL:-anthropic/claude-opus-4-5-20251101}"

[agent]
timeout_sec = 10800
network_mode = "allowlist"
allowed_hosts = [
  "pypi.org",
  "files.pythonhosted.org",
  "deb.debian.org",
  "security.debian.org",
  "ftp.debian.org",
  "snapshot.debian.org",
  "archive.ubuntu.com",
  "security.ubuntu.com",
  "ports.ubuntu.com",
  "dl-cdn.alpinelinux.org",
  "go.dev",
  "dl.google.com",
  "registry.npmjs.org",
  "registry.yarnpkg.com",
  "nodejs.org",
]

[environment]
docker_image = "ghcr.io/scaleapi/swe-atlas:swe_atlas_RF_secdev_scapy_697e7458be1623d850a88838_1.0@sha256:b4ea9829d47317f20e5d33c3d706b9fbd0aa7ac27d45a572604cc943de8f0dc7"
build_timeout_sec = 1800
allow_internet = true
cpus = 16
memory_mb = 16384
storage_mb = 20480
